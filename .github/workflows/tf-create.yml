name: "aws-dynamo-db-build"

on:
  push:
    branches: ["main"]
    paths: ["terraform/**"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  terraform:
    uses: rdavis542/aws-github-workflows/.github/workflows/tf-plan-apply.yml@main
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    with:
      aws_region: us-east-2
    secrets: inherit
