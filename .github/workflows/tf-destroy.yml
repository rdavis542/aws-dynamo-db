name: "aws-dynamo-db-destroy"

on:
  workflow_dispatch:
    inputs:
      confirm_destroy:
        description: 'Type "destroy" to confirm destruction of all resources'
        required: true
        type: string
      target_resource:
        description: 'Optional: specific resource to target (e.g. aws_dynamodb_table.main)'
        required: false
        type: string

jobs:
  terraform:
    uses: rdavis542/aws-github-workflows/.github/workflows/tf-destroy.yml@main
    with:
      aws_region: us-east-2
    secrets: inherit
